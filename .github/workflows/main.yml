name: MacRDP

on:
  workflow_dispatch:

jobs:
  build:
    name: MacRDP
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable VNC
        run: |
          # Create a dummy display and user session
          sudo /usr/bin/dscl . -create /Users/vnc
          sudo /usr/bin/dscl . -create /Users/vnc UserShell /bin/bash
          sudo /usr/bin/dscl . -create /Users/vnc RealName "VNC User"
          sudo /usr/bin/dscl . -create /Users/vnc UniqueID 1001
          sudo /usr/bin/dscl . -create /Users/vnc PrimaryGroupID 80
          sudo /usr/bin/dscl . -create /Users/vnc NFSHomeDirectory /Users/vnc
          sudo /usr/bin/dscl . -passwd /Users/vnc mypassword123
          
          # Enable screen sharing
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw mypassword123 \
            -restart -agent -privs -all
          
          # Force a GUI session for runner user
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          
          # Install and start noVNC + websockify for browser access
          pip3 install websockify --break-system-packages
          sleep 5

      - name: Install & Start ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ngrok tcp 5900 > /dev/null &
          sleep 8

      - name: VNC Login Details
        run: |
          curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          addr = data['tunnels'][0]['public_url'].replace('tcp://', '')
          host, port = addr.split(':')
          print('================================')
          print('VNC HOST    :', host)
          print('VNC PORT    :', port)
          print('VNC PASSWORD: mypassword123')
          print('================================')
          "

      - name: Keep Alive
        run: sleep 21600
