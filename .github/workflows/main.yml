name: MacRDP

on:
  workflow_dispatch:

jobs:
  build:
    name: MacRDP
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Set Password & Enable VNC
        run: |
          sudo dscl . -create /Users/runner Password "*"
          sudo dscl . -create /Users/runner ShadowHashData
          echo "mypassword123" | sudo tee /tmp/vnc_pass
          sudo dscl . -passwd /Users/runner "$(cat /tmp/vnc_pass)" || true
          sudo sysadminctl -adminUser runner -resetPasswordFor runner -newPassword mypassword123 || true
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCLegacyPassword -string "mypassword123"
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw mypassword123 \
            -restart -agent -privs -all
          sleep 5
          open -a Finder || true
          open -a Terminal || true
          sleep 3

      - name: Install & Start ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ngrok tcp 5900 > /dev/null &
          sleep 8

      - name: VNC Login Details
        run: |
          echo "Username: $(whoami)"
          curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          addr = data['tunnels'][0]['public_url'].replace('tcp://', '')
          host, port = addr.split(':')
          print('================================')
          print('VNC HOST    :', host)
          print('VNC PORT    :', port)
          print('VNC PASSWORD: mypassword123')
          print('================================')
          "

      - name: Keep Alive
        run: sleep 21600
