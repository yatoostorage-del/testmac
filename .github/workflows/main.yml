name: MacRDP

on:
  workflow_dispatch:

jobs:
  build:
    name: MacRDP
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Enable VNC
        run: |
          brew install x11vnc
          x11vnc -storepasswd P@ssw0rd! ~/.vnc/passwd
          x11vnc -passwd P@ssw0rd! -display :0 -forever -shared -bg -o /tmp/x11vnc.log
          sleep 3
          cat /tmp/x11vnc.log || true

      - name: Install & Start ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          brew install ngrok/ngrok/ngrok
          ngrok config add-authtoken $NGROK_AUTH_TOKEN
          ngrok tcp 5900 > /dev/null &
          sleep 8

      - name: VNC Login Details
        run: |
          curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          addr = data['tunnels'][0]['public_url'].replace('tcp://', '')
          host, port = addr.split(':')
          print('================================')
          print('VNC HOST    :', host)
          print('VNC PORT    :', port)
          print('VNC USERNAME: runneradmin')
          print('VNC PASSWORD: P@ssw0rd!')
          print('================================')
          "

      - name: Keep Alive
        run: sleep 21600
